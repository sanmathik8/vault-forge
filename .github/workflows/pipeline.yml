name: VaultForge Security Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Gitleaks - Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for secrets
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Handle Gitleaks failure
        if: steps.gitleaks.outcome == 'failure'
        uses: ./.github/actions/graceful-exit
        with:
          stage: "Gitleaks Secrets Scan"
          reason: "Exposed secrets were found. Check the logs above for exact file/line, remove the secret, and rotate it if it was ever pushed."

      - name: Confirm pass
        if: steps.gitleaks.outcome == 'success'
        run: echo "✅ No secrets detected. Proceeding to next stage."

  build-and-sbom:
    name: Build Image + Generate SBOM
    needs: secrets-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        id: docker-build
        continue-on-error: true
        run: docker build -t vault-forge-app:${{ github.sha }} ./app

      - name: Handle build failure
        if: steps.docker-build.outcome == 'failure'
        uses: ./.github/actions/graceful-exit
        with:
          stage: "Docker Build"
          reason: "Check ./app/Dockerfile for syntax errors, missing dependencies, or broken COPY/RUN instructions."

      - name: Save image for downstream jobs
        if: steps.docker-build.outcome == 'success'
        run: docker save vault-forge-app:${{ github.sha }} -o image.tar

      - name: Upload image artifact
        if: steps.docker-build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

      - name: Install Syft
        if: steps.docker-build.outcome == 'success'
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        id: sbom
        if: steps.docker-build.outcome == 'success'
        continue-on-error: true
        run: syft vault-forge-app:${{ github.sha }} -o cyclonedx-json=sbom.json

      - name: Handle SBOM failure
        if: steps.sbom.outcome == 'failure'
        uses: ./.github/actions/graceful-exit
        with:
          stage: "SBOM Generation"
          reason: "Syft couldn't scan the built image. Check the image name/tag matches the build step."

      - name: Upload SBOM artifact
        if: steps.sbom.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 30

      - name: Confirm pass
        if: steps.sbom.outcome == 'success'
        run: echo "✅ SBOM generated and uploaded successfully."

  image-scan:
    name: Trivy - Container Vulnerability Scan
    needs: build-and-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy scan
        id: trivy
        continue-on-error: true
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --format json \
            --output trivy-report.json \
            vault-forge-app:${{ github.sha }}

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 30

      - name: Report findings
        if: always()
        run: |
          echo "::warning::🔍 Trivy scan complete - check trivy-report artifact for CRITICAL/HIGH CVEs."
          echo "Base image is python:3.11.0b1-buster (EOL) - findings are expected and documented."
          # Not blocking here - old base image is a known, accepted risk for this demo app.
          # In a real production pipeline, CRITICAL findings would typically fail the build.

  sast-scan:
    name: Semgrep - SAST
    needs: secrets-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        id: semgrep
        continue-on-error: true
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
          generateSarif: "1"

      - name: Upload Semgrep SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif
          retention-days: 30

      - name: Check for findings
        if: steps.semgrep.outcome == 'failure'
        run: |
          echo "::warning::⚠️ Semgrep found security issues in the code."
          echo "This is expected for PyGoat (intentionally vulnerable app)."
          echo "Report uploaded as artifact 'semgrep-report' - review before deploying to any real environment."

      - name: Confirm pass
        if: steps.semgrep.outcome == 'success'
        run: echo "✅ No security issues found."
